services:
  mariadb:
    image: mariadb:10.11
    container_name: lamp_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    networks:
      - lamp_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  webserver:
    image: php:8.2.5-apache-bullseye
    container_name: lamp_webserver
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      WEBSERVER_ADMIN_USERNAME: ${WEBSERVER_ADMIN_USERNAME}
      WEBSERVER_ADMIN_PASSWORD: ${WEBSERVER_ADMIN_PASSWORD}
    volumes:
      # Web content directories
      - ./volumes/www/:/var/www/html/
      # Apache configuration
      - ./volumes/config/apache/apache2.conf:/etc/apache2/apache2.conf
      - ./volumes/config/apache/sites-available:/etc/apache2/sites-available
      - ./volumes/config/apache/sites-enabled:/etc/apache2/sites-enabled
    networks:
      - lamp_network
    ports:
      - "80"
      - "8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# Definiamo una rete personalizzata per isolare i nostri servizi
# Questo migliora la sicurezza e facilita la comunicazione tra container
networks:
  # Rete dedicata nginx proxy per i servizi LAMP e Node.js
  lamp_network:
    driver: bridge
    name: nginx_proxy_network

